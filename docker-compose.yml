services:
  postgres:
    image: postgres:17-alpine
    container_name: leadup-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: leadup
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - leadup_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadup-net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leadup-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/leadup}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LUSHA_API_KEY: ${LUSHA_API_KEY:-}
      APIFY_API_KEY: ${APIFY_API_KEY:-}
      BOOKING_URL: ${BOOKING_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5174}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    networks:
      - leadup-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: leadup-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:5174:5174"
    environment:
      VITE_PORT: "5174"
      VITE_API_URL: http://localhost:8002
      VITE_BOOKING_URL: ${VITE_BOOKING_URL:-}
    networks:
      - leadup-net
    restart: unless-stopped

volumes:
  leadup_postgres_data:

networks:
  leadup-net:
    driver: bridge
